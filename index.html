<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What do you think I should watch?</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d14;
      --card:       #13131f;
      --border:     #1e1e32;
      --border-hi:  #2a2a45;
      --pink:       #ff3d8a;
      --cyan:       #00d4c8;
      --white:      #f0eef8;
      --grey-1:     #c0bcd4;
      --grey-2:     #7a7690;
      --grey-3:     #3a3850;
      --radius:     6px;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 52px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .site-name {
      font-size: clamp(1.8rem, 7vw, 2.4rem);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--white);
    }

    /* Gradient on the question mark */
    .site-name em {
      font-style: normal;
      background: linear-gradient(90deg, var(--pink), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .site-desc {
      font-size: 12px;
      color: var(--grey-2);
      font-weight: 300;
      line-height: 1.6;
      letter-spacing: 0.01em;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-2);
      margin-bottom: 7px;
    }

    .select-wrap { position: relative; }

    select {
      width: 100%;
      appearance: none;
      background: var(--card);
      border: 1px solid var(--border-hi);
      border-radius: var(--radius);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 400;
      padding: 12px 40px 12px 14px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }

    select:hover  { border-color: var(--grey-2); }
    select:focus  { border-color: var(--pink); }

    select option { background: #1a1a2e; }

    .select-arrow {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--grey-2);
    }

    .select-arrow svg { display: block; width: 14px; height: 14px; }

    /* ── BUTTON ── */
    button {
      width: 100%;
      background: linear-gradient(90deg, var(--pink), var(--cyan));
      border: none;
      border-radius: var(--radius);
      color: #0d0d14;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover   { opacity: 0.88; }
    button:disabled { opacity: 0.25; cursor: not-allowed; }

    /* ── STATUS ── */
    #status-msg {
      font-size: 13px;
      color: var(--grey-2);
      min-height: 18px;
      font-style: italic;
    }

    #status-msg.error { color: var(--pink); font-style: normal; }

    /* ── RESULT ── */
    #result {
      display: none;
      flex-direction: column;
      background: var(--card);
      border: 1px solid var(--border-hi);
      border-radius: 8px;
      overflow: hidden;
    }

    #result.visible { display: flex; }

    /* ── POSTER ── */
    .poster-wrap {
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--border);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .poster-wrap img.loaded { opacity: 1; }

    /* Subtle gradient fade at bottom of poster into card */
    .poster-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(transparent, var(--card));
      pointer-events: none;
    }

    .poster-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey-3);
    }

    /* ── FILM INFO ── */
    .film-info {
      padding: 20px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .film-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .meta-item {
      font-size: 12px;
      color: var(--grey-2);
      font-weight: 400;
    }

    .meta-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--grey-3);
      flex-shrink: 0;
    }

    .meta-item.rating {
      color: var(--cyan);
      font-weight: 500;
    }

    .film-title {
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--white);
    }

    .film-genres {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .genre-tag {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid var(--border-hi);
      color: var(--grey-2);
    }

    .film-note {
      font-size: 13px;
      font-style: italic;
      color: var(--grey-1);
      line-height: 1.65;
      padding-left: 12px;
      border-left: 2px solid var(--pink);
    }

    .film-overview {
      font-size: 13px;
      color: var(--grey-2);
      line-height: 1.75;
      font-weight: 300;
    }

    .film-credits {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .credit-row {
      display: flex;
      gap: 12px;
      font-size: 12px;
    }

    .credit-label {
      color: var(--grey-3);
      min-width: 56px;
      flex-shrink: 0;
    }

    .credit-value { color: var(--grey-1); }

    /* ── QUIP ── */
    .quip {
      padding: 12px 20px 14px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      font-style: italic;
      color: var(--grey-3);
    }

    /* ── FOOTER ── */
    footer {
      font-size: 11px;
      color: var(--grey-3);
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="page">

  <header>
    <div class="site-name">What do you think<br/>I should watch<em>?</em></div>
    <div class="site-desc">Based on an attempt at a Top 250 · The Podcast Nobody Asked For recommendations · Some random shit thrown in</div>
  </header>

  <hr />

  <div class="controls">
    <div>
      <label for="genre-select">I'm in the mood for</label>
      <div class="select-wrap">
        <select id="genre-select">
          <option value="">Whatever. Surprise me.</option>
          <option value="Action">Action</option>
          <option value="Adventure">Adventure</option>
          <option value="Animation">Animation</option>
          <option value="Comedy">Comedy</option>
          <option value="Crime">Crime</option>
          <option value="Documentary">Documentary</option>
          <option value="Drama">Drama</option>
          <option value="Fantasy">Fantasy</option>
          <option value="History">History</option>
          <option value="Horror">Horror</option>
          <option value="Music">Music</option>
          <option value="Mystery">Mystery</option>
          <option value="Romance">Romance</option>
          <option value="Science Fiction">Science Fiction</option>
          <option value="Thriller">Thriller</option>
          <option value="War">War</option>
          <option value="Western">Western</option>
        </select>
        <span class="select-arrow">
          <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 5L7 10L12 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
    </div>

    <button id="pick-btn">Just tell me what to watch</button>
    <div id="status-msg"></div>
  </div>

  <div id="result">
    <div class="poster-wrap">
      <div class="poster-placeholder" id="poster-placeholder">No image</div>
      <img id="poster-img" src="" alt="" />
    </div>

    <div class="film-info">
      <div class="film-meta">
        <span class="meta-item" id="film-year"></span>
        <span class="meta-dot" id="dot-1"></span>
        <span class="meta-item" id="film-runtime"></span>
        <span class="meta-dot" id="dot-2"></span>
        <span class="meta-item rating" id="film-rating"></span>
      </div>

      <h1 class="film-title" id="film-title"></h1>

      <div class="film-genres" id="film-genres"></div>

      <p class="film-note"   id="film-note"   style="display:none"></p>
      <p class="film-overview" id="film-overview"></p>

      <div class="film-credits" id="film-credits" style="display:none">
        <div class="credit-row" id="dir-row"  style="display:none">
          <span class="credit-label">Director</span>
          <span class="credit-value" id="film-director"></span>
        </div>
        <div class="credit-row" id="cast-row" style="display:none">
          <span class="credit-label">Cast</span>
          <span class="credit-value" id="film-cast"></span>
        </div>
      </div>
    </div>

    <div class="quip" id="quip"></div>
  </div>

  <footer>Harries Film Unit</footer>

</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxAQq3D7K3oOkQlcrAnLl2Gcq8Fphax-p6tehfCyK_L1vQdhGGwH6i9_lkljj4Yhy_KMQ/exec';

  const quips = [
    "There. Was that so hard.",
    "You're welcome. Don't overthink it.",
    "The oracle has spoken. No appeals.",
    "Just watch it. Stop scrolling.",
    "This is a good film. Trust the system.",
    "Ian recommended this. Ian has good taste. Probably.",
    "This came up. The algorithm is not sorry.",
    "No refunds. No exchanges. Enjoy.",
    "A fine choice, if you had made it yourself.",
    "The database has been consulted. This is what it said.",
    "Stop asking questions. Press play.",
    "You wanted something to watch. Here it is.",
  ];

  const pickBtn  = document.getElementById('pick-btn');
  const resultEl = document.getElementById('result');

  pickBtn.addEventListener('click', async () => {
    pickBtn.disabled = true;
    resultEl.classList.remove('visible');
    setStatus('Consulting the database…');

    try {
      const genre = document.getElementById('genre-select').value;
      const url   = genre ? `${APPS_SCRIPT_URL}?genre=${encodeURIComponent(genre)}` : APPS_SCRIPT_URL;
      const res   = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const film  = await res.json();
      showFilm(film);
      setStatus('');
    } catch(e) {
      setStatus(`Something went wrong. ${e.message}`, true);
    }

    pickBtn.disabled = false;
  });

  function showFilm(film) {
    document.getElementById('film-title').textContent    = film.title    || '—';
    document.getElementById('film-year').textContent     = film.year     || '';
    document.getElementById('film-runtime').textContent  = film.runtime  ? film.runtime + ' min' : '';
    document.getElementById('film-rating').textContent   = film.rating   ? '★ ' + film.rating : '';
    document.getElementById('film-overview').textContent = film.overview || '';
    document.getElementById('quip').textContent          = quips[Math.floor(Math.random() * quips.length)];

    document.getElementById('dot-1').style.display = (film.year && film.runtime) ? 'block' : 'none';
    document.getElementById('dot-2').style.display = (film.runtime && film.rating) ? 'block' : 'none';

    const noteEl = document.getElementById('film-note');
    if (film.notes) { noteEl.textContent = film.notes; noteEl.style.display = 'block'; }
    else { noteEl.style.display = 'none'; }

    const genresEl = document.getElementById('film-genres');
    genresEl.innerHTML = '';
    (film.genres || []).forEach(name => {
      const s = document.createElement('span');
      s.className = 'genre-tag';
      s.textContent = name;
      genresEl.appendChild(s);
    });

    const creditsEl = document.getElementById('film-credits');
    const dirRow    = document.getElementById('dir-row');
    const castRow   = document.getElementById('cast-row');
    if (film.director) { document.getElementById('film-director').textContent = film.director; dirRow.style.display = 'flex'; }
    else { dirRow.style.display = 'none'; }
    if (film.cast) { document.getElementById('film-cast').textContent = film.cast; castRow.style.display = 'flex'; }
    else { castRow.style.display = 'none'; }
    creditsEl.style.display = (film.director || film.cast) ? 'flex' : 'none';

    const img         = document.getElementById('poster-img');
    const placeholder = document.getElementById('poster-placeholder');
    img.classList.remove('loaded');
    if (film.poster) {
      placeholder.style.display = 'none';
      img.src     = film.poster;
      img.alt     = film.title;
      img.onload  = () => img.classList.add('loaded');
      img.onerror = () => { img.src = ''; placeholder.style.display = 'flex'; };
    } else {
      img.src = '';
      placeholder.style.display = 'flex';
    }

    resultEl.classList.add('visible');
    setTimeout(() => resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className   = isError ? 'error' : '';
  }
</script>
</body>
</html>
